name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install actionlint
        run: |
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest /usr/local/bin

      - name: Lint GitHub Actions workflows
        run: actionlint

      - name: Install hadolint
        run: |
          curl -sSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfile
        run: hadolint .github/.devcontainer/Dockerfile

      - name: Lint shell scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck --severity=warning test/*.sh run_opencode_prompt.sh

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.24.0 -Force -Scope CurrentUser
          $excludeRules = @(
            'PSAvoidUsingWriteHost',
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingInvokeExpression',
            'PSAvoidDefaultValueSwitchParameter',
            'PSUseBOMForUnicodeEncodedFile',
            'PSUseSingularNouns',
            'PSUseDeclaredVarsMoreThanAssignments',
            'PSReviewUnusedParameter'
          )
          $results = @()
          $results += Invoke-ScriptAnalyzer -Path ./prompt.ps1 -Severity Warning -ExcludeRule $excludeRules
          $results += Invoke-ScriptAnalyzer -Path ./scripts/ -Recurse -Severity Warning -ExcludeRule $excludeRules
          $results += Invoke-ScriptAnalyzer -Path ./test/ -Recurse -Severity Warning -ExcludeRule $excludeRules
          if ($results.Count -gt 0) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }

      - name: Validate JSON files
        run: |
          errors=0
          for f in \
            .devcontainer/devcontainer.json \
            .github/.devcontainer/devcontainer.json \
            .github/.labels.json \
            .vscode/settings.json \
            global.json \
            opencode.json \
            test/fixtures/*.json; do
            if ! jq empty "$f" 2>&1; then
              echo "::error file=$f::Invalid JSON"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors JSON validation error(s)."
            exit 1
          fi

      - name: Validate JSON files against schemas
        run: |
          pip install --quiet check-jsonschema
          # Validate devcontainer.json files that declare a $schema
          # (opencode.json is excluded because it uses custom provider models
          #  not in the official schema enum)
          for f in .devcontainer/devcontainer.json .github/.devcontainer/devcontainer.json; do
            if [ -f "$f" ] && jq -e '."$schema"' "$f" > /dev/null 2>&1; then
              schema_url=$(jq -r '."$schema"' "$f")
              echo "Validating $f against $schema_url..."
              check-jsonschema --schemafile "$schema_url" "$f"
            fi
          done

      - name: Validate devcontainer.json
        run: |
          npx --yes @devcontainers/cli@0.84.0 validate --workspace-folder . || true

      # - name: Lint Markdown files
      #   uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v22.0.0
      #   with:
      #     globs: |
      #       **/*.md
      #       !.opencode/node_modules/**
      #       !node_modules/**
      #       !plan_docs/**

      # - name: Super-linter
      #   uses: super-linter/super-linter@61abc07d755095a68f4987d1c2c3d1d64408f1f9  # v8.5.0
      #   env:
      #     # To report GitHub Actions status checks
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm /tmp/gitleaks.tar.gz
          chmod +x /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source . --redact --no-git=false

  test-prompt-assembly:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify jq is available
        run: jq --version

      - name: Run prompt assembly tests
        run: bash test/test-prompt-assembly.sh

  test-image-tag-logic:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run image tag logic tests
        run: bash test/test-image-tag-logic.sh

  test-pester:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      # Required so gh auth status succeeds inside subprocess invocations.
      # Dry-run tests exit before gh issue create, so no real issues are created.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser -AllowClobber

      - name: Run Pester tests
        shell: pwsh
        run: pwsh -NoProfile -File ./test/run-pester-tests.ps1 -OutputXml ./test-results-pester.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pester-test-results
          path: test-results-pester.xml
          if-no-files-found: ignore

  test-devcontainer-build:
    needs: lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and clean devcontainer image metadata
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/devcontainer:main-latest"
          docker pull "$IMAGE" || true
          # If prebuilt image is not available yet, build a local fallback image
          # so devcontainers/ci can still run smoke tests on this commit.
          if ! docker image inspect "$IMAGE" > /dev/null 2>&1; then
            docker build \
              -f .github/.devcontainer/Dockerfile \
              -t "$IMAGE" \
              .github/.devcontainer
          fi
          # Strip stale devcontainer.metadata label from cached prebuild
          if docker image inspect "$IMAGE" > /dev/null 2>&1; then
            echo "FROM $IMAGE" | docker build --label devcontainer.metadata='[]' -t "$IMAGE" -
          fi
          # Ensure the image referenced by .devcontainer/devcontainer.json is
          # available locally (handles fresh template clones whose devcontainer
          # config still points at the template repo's prebuilt image).
          DC_IMAGE=$(jq -r '.image // empty' .devcontainer/devcontainer.json)
          if [ -n "$DC_IMAGE" ] && [ "$DC_IMAGE" != "$IMAGE" ]; then
            if ! docker image inspect "$DC_IMAGE" > /dev/null 2>&1; then
              docker tag "$IMAGE" "$DC_IMAGE"
            fi
          fi

      - name: Build devcontainer and run smoke tests
        uses: devcontainers/ci@8bf61b26e9c3a98f69cb6ce2f88d24ff59b785c6 # v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer
          cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
          push: never
          runCmd: bash test/test-devcontainer-tools.sh
